name: Deploy Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch: {}

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json

      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: npx firebase-tools@latest deploy --only firestore:rules --non-interactive

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json
